<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tamroi Grid Fog Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="demo.css">
</head>
<body>
  <main class="demo-shell">
    <section class="demo-topbar">
      <div>
        <p class="demo-kicker">Tamroi Proposal Demo</p>
        <h1>Thailand Grid Fog</h1>
      </div>
      <div class="demo-badge">/demo</div>
    </section>

    <section class="demo-map-card" aria-label="Grid fog map demo">
      <div id="demo-map"></div>
      <div class="demo-map-overlay">
        <div>
          <span class="demo-label">Current Grid</span>
          <strong id="current-cell">-</strong>
        </div>
        <div>
          <span class="demo-label">Visibility</span>
          <strong id="visibility-state">Unlocked</strong>
        </div>
      </div>
      <div class="demo-user-pin" aria-hidden="true"></div>
    </section>

    <section class="demo-panel">
      <div class="demo-stat-grid">
        <article>
          <span>Grid Coverage</span>
          <strong id="grid-count">180</strong>
        </article>
        <article>
          <span>Unlocked</span>
          <strong id="unlocked-count">1</strong>
        </article>
        <article>
          <span>Mode</span>
          <strong>Cell</strong>
        </article>
      </div>

      <div class="demo-control-group" aria-label="Sample current locations">
        <button class="demo-location-btn active" type="button" data-lat="13.7563" data-lng="100.5018" data-name="Bangkok">
          Bangkok
        </button>
        <button class="demo-location-btn" type="button" data-lat="18.7883" data-lng="98.9853" data-name="Chiang Mai">
          Chiang Mai
        </button>
        <button class="demo-location-btn" type="button" data-lat="7.8804" data-lng="98.3923" data-name="Phuket">
          Phuket
        </button>
      </div>

      <div class="demo-copy">
        <h2 id="location-name">Bangkok</h2>
        <p>
          เมื่อผู้เล่นอยู่ในช่องกริดนี้ Fog of War ของช่องนั้นจะถูกเปิดให้เห็นทันที
          ส่วนช่องอื่นยังคงถูกปิดไว้จนกว่าจะเดินทางไปถึง
        </p>
      </div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../js/fog-grid.js"></script>
  <script src="demo.js"></script>
</body>
</html>
