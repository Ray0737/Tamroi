<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Tam_roi — ลุยไทย</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    /* ── Page shell ─────────────────────────────────────── */
    .splash-screen {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 8vh var(--space-md) 210px;
      position: relative;
      overflow: hidden;
    }

    /* ── Organic ink-drop blobs ──────────────────────────── */
    .bg-blob {
      position: absolute;
      pointer-events: none;
    }

    .bg-blob-1 {
      width: 340px;
      height: 320px;
      top: -110px;
      right: -130px;
      background: var(--color-success);
      opacity: 0.06;
      border-radius: 30% 70% 60% 40% / 50% 40% 60% 50%;
      animation: blobMorph 14s ease-in-out infinite;
    }

    .bg-blob-2 {
      width: 230px;
      height: 250px;
      bottom: 190px;
      left: -75px;
      background: var(--color-primary);
      opacity: 0.07;
      border-radius: 60% 40% 40% 60% / 60% 60% 40% 40%;
      animation: blobMorph 18s ease-in-out infinite reverse;
    }

    .bg-blob-3 {
      width: 160px;
      height: 140px;
      top: 36%;
      left: 14%;
      background: var(--color-success);
      opacity: 0.05;
      border-radius: 70% 30% 50% 50% / 40% 60% 40% 60%;
      animation: blobMorph 10s ease-in-out infinite 3s;
    }

    /* ── Hero cluster ────────────────────────────────────── */
    .hero-cluster {
      position: relative;
      width: 220px;
      height: 220px;
      margin-bottom: var(--space-lg);
      flex-shrink: 0;
    }

    /* Center book card */
    .hero-book {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 92px;
      height: 92px;
      background: var(--color-card-dark);
      border: 1.5px solid rgba(246, 193, 158, 0.25);
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35), 0 0 0 6px rgba(246, 193, 158, 0.06);
      animation: pulse 4s ease-in-out infinite 1s;
    }

    .hero-book svg {
      width: 52px;
      height: 52px;
    }

    /* Floating badge cards */
    .hero-badge {
      position: absolute;
      width: 52px;
      height: 52px;
      background: var(--color-card-dark);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .hero-badge svg {
      width: 22px;
      height: 22px;
      stroke: var(--color-primary);
    }

    /* Positions form a loose diamond around center */
    .hb-tl {
      top: 12px;
      left: 16px;
      animation: floatY 3.0s ease-in-out infinite;
    }

    .hb-tr {
      top: 12px;
      right: 16px;
      animation: floatY 3.5s ease-in-out infinite 0.5s;
    }

    .hb-bl {
      bottom: 12px;
      left: 16px;
      animation: floatY 4.0s ease-in-out infinite 1.0s;
    }

    .hb-br {
      bottom: 12px;
      right: 16px;
      animation: floatY 3.2s ease-in-out infinite 1.5s;
    }

    /* Connector lines (decorative) */
    .hero-cluster::before,
    .hero-cluster::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(246, 193, 158, 0.15), transparent);
      transform-origin: left center;
    }

    .hero-cluster::before {
      transform: translate(-50%, -50%) rotate(-35deg);
    }

    .hero-cluster::after {
      transform: translate(-50%, -50%) rotate(35deg);
    }

    @keyframes floatY {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-7px);
      }
    }

    /* ── Title ───────────────────────────────────────────── */
    .app-name {
      font-family: var(--font-heading);
      font-size: 34px;
      font-weight: 700;
      text-align: center;
      line-height: 1;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .app-name .accent {
      color: var(--color-primary);
    }

    .app-tagline {
      font-size: var(--text-xs);
      color: var(--color-muted);
      text-align: center;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: var(--space-lg);
    }

    /* ── Feature card grid (replaces pills) ──────────────── */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--space-sm);
      width: 100%;
      max-width: 300px;
      margin-bottom: 0;
    }

    .feature-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: var(--radius-lg);
      padding: 14px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      text-align: center;
    }

    .feature-card svg {
      width: 20px;
      height: 20px;
      stroke: var(--color-primary);
      flex-shrink: 0;
    }

    .feature-card span {
      font-size: 10px;
      color: var(--color-muted);
      line-height: 1.3;
      font-weight: 500;
    }

    /* ── Developer footer ────────────────────────────────── */
    .dev-footer {
      margin-top: var(--space-xl);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .dev-by {
      font-size: 11px;
      color: var(--color-muted);
      margin: 0;
    }

    .dev-name {
      color: var(--color-white);
      font-weight: 600;
    }

    .dev-school {
      font-size: 10px;
      color: rgba(137, 134, 168, 0.6);
      margin: 0;
      line-height: 1.6;
    }

    .dev-links {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 2px;
    }

    .dev-link {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: rgba(137, 134, 168, 0.65);
      text-decoration: none;
      transition: color var(--transition-fast);
    }

    .dev-link:hover {
      color: var(--color-primary);
    }

    .dev-sep {
      color: rgba(137, 134, 168, 0.3);
      font-size: 10px;
    }

    /* ── Bottom CTA ──────────────────────────────────────── */
    .bottom-cta {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      max-width: var(--max-width);
      background: linear-gradient(to top, var(--color-bg) 60%, transparent);
      padding: 48px var(--space-lg) calc(var(--space-lg) + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .cta-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      height: 52px;
      background: var(--color-primary);
      color: var(--color-on-primary);
      border-radius: var(--radius-full);
      font-family: var(--font-heading);
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 8px 32px rgba(246, 193, 158, 0.28);
      transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.15s ease;
      letter-spacing: 0.3px;
    }

    .cta-primary svg {
      width: 18px;
      height: 18px;
      transition: transform 0.2s ease;
    }

    .cta-primary:hover {
      background: #ECA07A;
      box-shadow: 0 12px 40px rgba(246, 193, 158, 0.35);
      transform: translateY(-1px);
      color: var(--color-on-primary);
    }

    .cta-primary:hover svg {
      transform: translateX(3px);
    }

    .cta-primary:active {
      transform: scale(0.97);
      opacity: 0.95;
    }

    .cta-login {
      font-size: 13px;
      color: var(--color-muted);
      margin: 14px 0 0;
      text-align: center;
    }

    .cta-login a {
      color: var(--color-white);
      font-weight: 600;
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.22);
      padding-bottom: 1px;
      transition: border-color 0.15s ease, color 0.15s ease;
    }

    .cta-login a:hover {
      color: var(--color-primary);
      border-color: var(--color-primary);
    }
  </style>
</head>

  <script src="js/supabase-client.js"></script>
  <script>
    (async () => {
      try {
        const session = await DB.Auth.getSession();
        if (session) {
          // Already logged in — go to app, or onboarding if not yet completed
          const dest = localStorage.getItem('tam_roi_onboarded') ? 'app.html' : 'onboarding.html';
          window.location.replace(dest);
        }
      } catch { /* Supabase not configured yet — stay on splash */ }
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
